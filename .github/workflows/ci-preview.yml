name: CI + Docker Build

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: pytest

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: survey-copilot:${{ github.sha }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  r-bridge-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - run: Rscript -e 'options(repos="https://cloud.r-project.org"); install.packages(c("psych","magrittr"), dependencies=TRUE)'
      - run: Rscript r/efa_wrapper.R <(printf 'a,b\n1,2\n2,3\n') /tmp/efa_out.json 2
        continue-on-error: true
      - run: test -f /tmp/efa_out.json
